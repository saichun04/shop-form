<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงานหาร้านค้าเช่า — ภูเก็ตโกรเซอรี่</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efefed;
    --text:#1a1a18;--text2:#6b6b68;--text3:#9b9b98;
    --border:#e0e0dc;--border2:#c8c8c4;
    --radius:8px;--radius-lg:12px;
    --blue-bg:#E6F1FB;--blue-text:#185FA5;
    --amber-bg:#FAEEDA;--amber-text:#854F0B;
    --red-bg:#FCEBEB;--red-text:#A32D2D;
    --green-bg:#EAF3DE;--green-text:#3B6D11;
    --purple-bg:#EEEDFE;--purple-text:#3C3489;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#323230;
      --text:#f0f0ee;--text2:#a0a09d;--text3:#70706d;
      --border:#3a3a37;--border2:#4a4a47;
      --blue-bg:#0c447c;--blue-text:#B5D4F4;
      --amber-bg:#633806;--amber-text:#FAC775;
      --red-bg:#791F1F;--red-text:#F7C1C1;
      --green-bg:#27500A;--green-text:#C0DD97;
      --purple-bg:#26215C;--purple-text:#CECBF6;
    }
  }
  body{background:var(--bg3);font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);min-height:100vh}
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap');
  .wrap{max-width:700px;margin:0 auto;padding:1.25rem 1rem 3rem}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:10px}
  .top-title{font-size:18px;font-weight:600}
  .top-sub{font-size:12px;color:var(--text2);margin-top:2px}
  .date-input{font-size:13px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
  .section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .form-full{margin-bottom:8px}
  label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:'Sarabun',sans-serif;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--border2)}
  textarea{resize:none;height:60px;line-height:1.6}
  .btn-add{width:100%;padding:9px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:'Sarabun',sans-serif;transition:opacity .15s}
  .btn-add:hover{opacity:.85}
  .counter-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
  .counter{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.75rem .4rem;text-align:center}
  .counter-num{font-size:22px;font-weight:600}
  .counter-lbl{font-size:11px;color:var(--text2);margin-top:2px}
  .c-amber{color:#BA7517}.c-red{color:#A32D2D}.c-blue{color:#185FA5}.c-green{color:#3B6D11}.c-purple{color:#534AB7}
  @media(prefers-color-scheme:dark){.c-amber{color:#FAC775}.c-red{color:#F7C1C1}.c-blue{color:#B5D4F4}.c-green{color:#C0DD97}.c-purple{color:#CECBF6}}
  .tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--border);overflow-x:auto}
  .tab{padding:8px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Sarabun',sans-serif;font-weight:500;white-space:nowrap;transition:color .15s}
  .tab.active{color:var(--text);border-bottom:2px solid var(--text)}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:var(--radius);font-size:11px;font-weight:600;white-space:nowrap}
  .badge-red{background:var(--red-bg);color:var(--red-text)}
  .badge-amber{background:var(--amber-bg);color:var(--amber-text)}
  .badge-blue{background:var(--blue-bg);color:var(--blue-text)}
  .badge-purple{background:var(--purple-bg);color:var(--purple-text)}
  .shop-item{border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;background:var(--bg);border-left:3px solid transparent}
  .shop-item.has-appt{border-left-color:#7F77DD}
  .shop-item.overdue-item{border-left-color:#A32D2D}
  .shop-item.today-item{border-left-color:#185FA5}
  .shop-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .shop-name{font-weight:600;font-size:14px}
  .shop-meta{font-size:12px;color:var(--text2);margin-top:4px;display:flex;flex-wrap:wrap;gap:10px}
  .shop-note{font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6}
  .btn-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;line-height:1;font-size:16px;transition:color .15s}
  .btn-del:hover{color:var(--red-text)}
  .status-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
  .btn-status{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text2);cursor:pointer;font-family:'Sarabun',sans-serif;transition:background .15s}
  .btn-status:hover{background:var(--bg2)}
  .btn-appt{font-size:11px;padding:3px 10px;border:1px solid #AFA9EC;border-radius:var(--radius);background:var(--purple-bg);color:var(--purple-text);cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600}
  .btn-photo{font-size:11px;padding:3px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500}
  .btn-photo:hover{background:var(--bg3)}
  .appt-box{margin-top:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)}
  .appt-form{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-top:6px}
  .appt-form select,.appt-form input[type=date]{flex:1;min-width:120px;font-size:12px;padding:6px 8px}
  .btn-save-appt{padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:'Sarabun',sans-serif;font-weight:600;white-space:nowrap}
  .btn-rm-appt{padding:6px 10px;background:none;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text2);font-family:'Sarabun',sans-serif}
  .appt-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .appt-info{font-size:12px;font-weight:600}
  .appt-overdue{color:var(--red-text)}
  .appt-today{color:#185FA5}
  .appt-future{color:#534AB7}

  /* Photo styles */
  .photos-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .photo-thumb{position:relative;width:90px;height:70px;flex-shrink:0}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);transition:opacity .15s}
  .photo-thumb img:hover{opacity:.85}
  .photo-del-btn{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#A32D2D;color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
  .photo-add-slot{width:90px;height:70px;border:1.5px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:11px;background:var(--bg2);transition:border-color .15s;flex-shrink:0}
  .photo-add-slot:hover{border-color:var(--border2);color:var(--text2);background:var(--bg3)}
  .photo-add-slot i{font-size:20px}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer}
  .lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--radius);object-fit:contain;cursor:default}
  .lightbox-close{position:fixed;top:16px;right:18px;color:#fff;font-size:28px;cursor:pointer;line-height:1;background:none;border:none}

  .empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px}
  .empty i{font-size:32px;display:block;margin-bottom:10px;opacity:.5}
  .day-group{margin-bottom:1.25rem}
  .day-group-header{font-size:12px;font-weight:600;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .grp-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin:12px 0 6px;display:flex;align-items:center;gap:6px}
  .counter-label{font-size:12px;color:var(--text3)}
  .export-btn{padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:12px;font-family:'Sarabun',sans-serif;cursor:pointer;font-weight:500;transition:background .15s;white-space:nowrap}
  .export-btn:hover{background:var(--bg2)}
  .top-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .remind-group{margin-bottom:1.25rem}
  .remind-group-label{font-size:12px;font-weight:600;padding:5px 10px;border-radius:var(--radius);margin-bottom:8px;display:inline-flex;align-items:center;gap:6px}
  .lbl-overdue{background:var(--red-bg);color:var(--red-text)}
  .lbl-today{background:var(--blue-bg);color:var(--blue-text)}
  .lbl-future{background:var(--purple-bg);color:var(--purple-text)}
  @media(max-width:480px){
    .form-row{grid-template-columns:1fr}
    .counter-row{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="ti ti-x"></i></button>
  <img id="lightbox-img" src="" onclick="event.stopPropagation()">
</div>

<div class="wrap">
  <div class="top-bar">
    <div>
      <div class="top-title"><i class="ti ti-building-store" style="font-size:18px;vertical-align:-3px;margin-right:6px"></i>รายงานหาร้านค้าเช่า</div>
      <div class="top-sub">ภูเก็ตโกรเซอรี่ — บันทึกประจำวัน</div>
    </div>
    <div class="top-actions">
      <input type="date" class="date-input" id="reportDate">
      <button class="export-btn" onclick="exportPDF()"><i class="ti ti-file-type-pdf" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Export PDF</button>
      <button class="export-btn" onclick="clearData()" style="color:#A32D2D;border-color:#F7C1C1"><i class="ti ti-trash" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>ล้างข้อมูล</button>
    </div>
  </div>

  <div class="counter-row">
    <div class="counter"><div class="counter-num" id="cTotal">0</div><div class="counter-lbl">วันนี้</div></div>
    <div class="counter"><div class="counter-num c-red" id="cReject">0</div><div class="counter-lbl">ปฏิเสธ</div></div>
    <div class="counter"><div class="counter-num c-amber" id="cPending">0</div><div class="counter-lbl">ติดตาม</div></div>
    <div class="counter"><div class="counter-num c-blue" id="cQuote">0</div><div class="counter-lbl">ขอใบเสนอ</div></div>
    <div class="counter"><div class="counter-num c-purple" id="cAppt">0</div><div class="counter-lbl">นัดหมาย</div></div>
  </div>

  <div class="card">
    <div class="section-label">บันทึกร้านค้าใหม่</div>
    <div class="form-row">
      <div><label>ชื่อร้าน *</label><input id="fName" placeholder="ชื่อร้านค้า"></div>
      <div><label>เบอร์โทรศัพท์ *</label><input id="fPhone" placeholder="0XX-XXX-XXXX" inputmode="tel"></div>
    </div>
    <div class="form-full"><label>ที่อยู่คร่าวๆ</label><input id="fAddr" placeholder="เช่น ถ.เยาวราช ใกล้วงเวียนนิมิต, ตลาดใหม่ ถลาง"></div>
    <div class="form-row">
      <div>
        <label>ประเภทธุรกิจ</label>
        <select id="fType">
          <option value="">— เลือก —</option>
          <option>อาหาร/ร้านอาหาร</option>
          <option>เสื้อผ้า/แฟชั่น</option>
          <option>บิวตี้/สปา</option>
          <option>ของชำ/สินค้าอุปโภค</option>
          <option>บริการ</option>
          <option>อื่นๆ</option>
        </select>
      </div>
      <div>
        <label>สถานะ *</label>
        <select id="fStatus">
          <option value="pending">กำลังพิจารณา</option>
          <option value="quote">ขอใบเสนอราคา</option>
          <option value="reject">ปฏิเสธ</option>
        </select>
      </div>
    </div>
    <div class="form-full"><label>หมายเหตุ / รายละเอียดการติดต่อ</label><textarea id="fNote" placeholder="เช่น นัดโทรกลับพรุ่งนี้, ถามขนาดพื้นที่และราคา..."></textarea></div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-add" onclick="addShop()" style="flex:1"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>บันทึกร้านค้า</button>
      <span style="font-size:12px;color:var(--text3)" id="shopCounterLabel">0/5</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')" id="tab-today">วันนี้</button>
    <button class="tab" onclick="switchTab('followup')" id="tab-followup">ต้องติดตาม <span id="badgeFollow"></span></button>
    <button class="tab" onclick="switchTab('remind')" id="tab-remind">นัดหมาย <span id="badgeAppt"></span></button>
    <button class="tab" onclick="switchTab('all')" id="tab-all">ทั้งหมด</button>
  </div>

  <div id="view-today"></div>
  <div id="view-followup" style="display:none"></div>
  <div id="view-remind" style="display:none"></div>
  <div id="view-all" style="display:none"></div>
</div>

<!-- hidden file inputs (one per active shop, created dynamically) -->
<div id="file-inputs" style="display:none"></div>

<script>
const STORAGE_KEY = 'phuket_grocery_prospects_v3';
let data = [];

function todayStr(){ return new Date().toISOString().split('T')[0]; }
function getReportDate(){ return document.getElementById('reportDate').value; }
function fmtDate(d){ return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{weekday:'short',year:'2-digit',month:'short',day:'numeric'}); }
function fmtDateLong(d){ return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function dayLabel(d){
  const t=todayStr();
  if(d<t){ const diff=Math.round((new Date(t)-new Date(d))/864e5); return {cls:'overdue',txt:`เลยกำหนด ${diff} วัน`}; }
  if(d===t) return {cls:'today',txt:'วันนี้'};
  const diff=Math.round((new Date(d)-new Date(t))/864e5);
  return {cls:'future',txt:diff===1?'พรุ่งนี้':`อีก ${diff} วัน`};
}
function load(){ try{ data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }catch(e){ data=[]; } render(); }
function save(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }catch(e){ alert('พื้นที่เก็บข้อมูลเต็ม กรุณาลบรูปบางรูปหรือ Export แล้วล้างข้อมูล'); } }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function statusBadge(s){
  if(s==='reject') return '<span class="badge badge-red"><i class="ti ti-x"></i> ปฏิเสธ</span>';
  if(s==='quote')  return '<span class="badge badge-blue"><i class="ti ti-file-invoice"></i> ขอใบเสนอราคา</span>';
  return '<span class="badge badge-amber"><i class="ti ti-clock"></i> กำลังพิจารณา</span>';
}
function apptTypeTH(t){ return t==='visit'?'นัดเข้าดูพื้นที่':'โทรกลับ'; }
function apptIcon(t){ return t==='visit'?'ti-map-pin':'ti-phone-call'; }

/* ── PHOTO SECTION ── */
function photosHtml(shop){
  const photos = shop.photos || [];
  const canAdd = photos.length < 2;
  let html = '<div class="photos-row">';
  photos.forEach((src,i)=>{
    html += `<div class="photo-thumb">
      <img src="${src}" alt="รูปที่ ${i+1}" onclick="openLightbox('${shop.id}',${i})" title="คลิกเพื่อขยาย">
      <button class="photo-del-btn" onclick="delPhoto('${shop.id}',${i})" title="ลบรูป"><i class="ti ti-x" style="font-size:10px"></i></button>
    </div>`;
  });
  if(canAdd){
    html += `<div class="photo-add-slot" onclick="triggerPhotoInput('${shop.id}')" title="เพิ่มรูปภาพ">
      <i class="ti ti-camera-plus"></i>
      <span>${photos.length===0?'เพิ่มรูป':'เพิ่ม'}(${photos.length}/2)</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

window.triggerPhotoInput = function(id){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.style.display='none';
  inp.onchange = e=>{ if(e.target.files[0]) compressAndSave(id, e.target.files[0]); };
  document.body.appendChild(inp);
  inp.click();
  setTimeout(()=>inp.remove(), 30000);
};

function compressAndSave(id, file){
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX=900, canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h && w>MAX){ h=Math.round(h*MAX/w); w=MAX; }
      else if(h>MAX){ w=Math.round(w*MAX/h); h=MAX; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed = canvas.toDataURL('image/jpeg',0.72);
      const shop = data.find(d=>d.id===id);
      if(!shop) return;
      if(!shop.photos) shop.photos=[];
      if(shop.photos.length>=2){ alert('เพิ่มได้สูงสุด 2 รูปต่อร้าน'); return; }
      shop.photos.push(compressed);
      save(); render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

window.delPhoto = function(id, idx){
  if(!confirm('ลบรูปนี้?')) return;
  const shop=data.find(d=>d.id===id);
  if(shop && shop.photos){ shop.photos.splice(idx,1); save(); render(); }
};

window.openLightbox = function(id, idx){
  const shop=data.find(d=>d.id===id);
  if(!shop||!shop.photos||!shop.photos[idx]) return;
  document.getElementById('lightbox-img').src = shop.photos[idx];
  document.getElementById('lightbox').style.display='flex';
  document.body.style.overflow='hidden';
};

window.closeLightbox = function(){
  document.getElementById('lightbox').style.display='none';
  document.body.style.overflow='';
};
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

/* ── SHOP CARD ── */
function shopCard(shop){
  const appt=shop.appt, t=todayStr();
  let leftCls='';
  if(appt&&appt.date){ leftCls=appt.date<t?' overdue-item':appt.date===t?' today-item':' has-appt'; }

  let apptSection='';
  if(appt&&appt.date){
    const dl=dayLabel(appt.date);
    const cc={overdue:'appt-overdue',today:'appt-today',future:'appt-future'}[dl.cls];
    apptSection=`<div class="appt-box">
      <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px">นัดหมาย</div>
      <div class="appt-row">
        <div class="appt-info ${cc}"><i class="ti ${apptIcon(appt.type)}" style="font-size:13px;vertical-align:-2px;margin-right:5px"></i>${apptTypeTH(appt.type)}<span style="margin:0 5px;opacity:.35">·</span>${fmtDateLong(appt.date)}<span style="font-size:11px;margin-left:6px;font-weight:400;opacity:.75">(${dl.txt})</span></div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button class="btn-rm-appt" onclick="toggleApptForm('${shop.id}')"><i class="ti ti-edit" style="font-size:12px;vertical-align:-2px"></i> แก้ไข</button>
          <button class="btn-rm-appt" onclick="removeAppt('${shop.id}')" style="color:var(--red-text);border-color:var(--red-text)" title="ยกเลิกนัด"><i class="ti ti-calendar-x" style="font-size:12px;vertical-align:-2px"></i></button>
        </div>
      </div>
      <div id="appt-form-${shop.id}" style="display:none;margin-top:8px">
        <div class="appt-form">
          <select id="atype-${shop.id}"><option value="call" ${appt.type==='call'?'selected':''}>โทรกลับ</option><option value="visit" ${appt.type==='visit'?'selected':''}>นัดเข้าดูพื้นที่</option></select>
          <input type="date" id="adate-${shop.id}" value="${appt.date}">
          <button class="btn-save-appt" onclick="saveAppt('${shop.id}')">บันทึก</button>
          <button class="btn-rm-appt" onclick="toggleApptForm('${shop.id}')">ยกเลิก</button>
        </div>
      </div>
    </div>`;
  } else {
    apptSection=`<div id="appt-form-${shop.id}" style="display:none" class="appt-box">
      <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">ตั้งนัดหมาย</div>
      <div class="appt-form">
        <select id="atype-${shop.id}"><option value="call">โทรกลับ</option><option value="visit">นัดเข้าดูพื้นที่</option></select>
        <input type="date" id="adate-${shop.id}" value="${t}">
        <button class="btn-save-appt" onclick="saveAppt('${shop.id}')"><i class="ti ti-check" style="font-size:12px;vertical-align:-2px;margin-right:3px"></i>บันทึก</button>
        <button class="btn-rm-appt" onclick="toggleApptForm('${shop.id}')">ยกเลิก</button>
      </div>
    </div>`;
  }

  const photos=shop.photos||[];
  return `<div class="shop-item${leftCls}" id="s-${shop.id}">
    <div class="shop-header">
      <div style="flex:1;min-width:0">
        <div class="shop-name">${esc(shop.name)}</div>
        <div class="shop-meta">
          <span><i class="ti ti-phone" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${esc(shop.phone)}</span>
          ${shop.addr?`<span><i class="ti ti-map-pin" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${esc(shop.addr)}</span>`:''}
          ${shop.type?`<span><i class="ti ti-tag" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${esc(shop.type)}</span>`:''}
        </div>
        ${shop.note?`<div class="shop-note"><i class="ti ti-notes" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>${esc(shop.note)}</div>`:''}
        <div class="status-btns">
          ${shop.status!=='reject'?`<button class="btn-status" onclick="chgStatus('${shop.id}','reject')">ปฏิเสธ</button>`:''}
          ${shop.status!=='pending'?`<button class="btn-status" onclick="chgStatus('${shop.id}','pending')">กำลังพิจารณา</button>`:''}
          ${shop.status!=='quote'?`<button class="btn-status" onclick="chgStatus('${shop.id}','quote')">ขอใบเสนอราคา</button>`:''}
          ${!(appt&&appt.date)?`<button class="btn-appt" onclick="toggleApptForm('${shop.id}')"><i class="ti ti-calendar-plus" style="font-size:12px;vertical-align:-2px;margin-right:3px"></i>ตั้งนัด</button>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${statusBadge(shop.status)}
        <button class="btn-del" onclick="delShop('${shop.id}')" title="ลบ"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    ${photosHtml(shop)}
    ${apptSection}
  </div>`;
}

/* ── RENDER ── */
function render(){
  const rDate=getReportDate(), t=todayStr();
  const todayShops=data.filter(s=>s.date===rDate);
  const followShops=data.filter(s=>s.status!=='reject');
  const apptShops=data.filter(s=>s.appt&&s.appt.date);
  const overdueCount=apptShops.filter(s=>s.appt.date<t).length;
  const todayApptCount=apptShops.filter(s=>s.appt.date===t).length;

  document.getElementById('cTotal').textContent=todayShops.length;
  document.getElementById('cReject').textContent=todayShops.filter(s=>s.status==='reject').length;
  document.getElementById('cPending').textContent=todayShops.filter(s=>s.status==='pending').length;
  document.getElementById('cQuote').textContent=todayShops.filter(s=>s.status==='quote').length;
  document.getElementById('cAppt').textContent=apptShops.length;
  document.getElementById('cAppt').className='counter-num '+(overdueCount>0?'c-red':todayApptCount>0?'c-blue':'c-purple');
  document.getElementById('shopCounterLabel').textContent=`${todayShops.length}/5 ร้านวันนี้`;
  document.getElementById('badgeFollow').textContent=followShops.length>0?`(${followShops.length})`:'';
  document.getElementById('badgeAppt').textContent=overdueCount>0?`(${overdueCount} เลยกำหนด!)`:apptShops.length>0?`(${apptShops.length})`:'';

  // today
  const vt=document.getElementById('view-today');
  if(!todayShops.length){ vt.innerHTML='<div class="empty"><i class="ti ti-building-store"></i>ยังไม่มีร้านค้าสำหรับวันนี้</div>'; }
  else {
    const g={quote:[],pending:[],reject:[]};
    todayShops.forEach(s=>g[s.status].push(s));
    let h='';
    if(g.quote.length) h+=`<div class="grp-label"><i class="ti ti-file-invoice" style="font-size:14px"></i>ขอใบเสนอราคา (${g.quote.length})</div>${g.quote.map(shopCard).join('')}`;
    if(g.pending.length) h+=`<div class="grp-label"><i class="ti ti-clock" style="font-size:14px"></i>กำลังพิจารณา — ต้องติดตาม (${g.pending.length})</div>${g.pending.map(shopCard).join('')}`;
    if(g.reject.length) h+=`<div class="grp-label"><i class="ti ti-x" style="font-size:14px"></i>ปฏิเสธ (${g.reject.length})</div>${g.reject.map(shopCard).join('')}`;
    vt.innerHTML=h;
  }

  // followup
  const vf=document.getElementById('view-followup');
  if(!followShops.length){ vf.innerHTML='<div class="empty"><i class="ti ti-check"></i>ไม่มีรายการที่ต้องติดตามในขณะนี้</div>'; }
  else {
    const byDate={};
    followShops.forEach(s=>{ if(!byDate[s.date]) byDate[s.date]=[]; byDate[s.date].push(s); });
    let h='';
    Object.keys(byDate).sort().reverse().forEach(d=>{
      const cnt=byDate[d].length,qCnt=byDate[d].filter(s=>s.status==='quote').length;
      h+=`<div class="day-group"><div class="day-group-header"><span>${fmtDate(d)}</span><span class="counter-label">${cnt} ร้าน${qCnt>0?` · ขอใบเสนอ ${qCnt}`:''}</span></div>${byDate[d].map(shopCard).join('')}</div>`;
    });
    vf.innerHTML=h;
  }

  // remind
  const vr=document.getElementById('view-remind');
  if(!apptShops.length){ vr.innerHTML='<div class="empty"><i class="ti ti-calendar"></i>ยังไม่มีนัดหมาย<br><span style="font-size:12px;margin-top:6px;display:block">กดปุ่ม <strong>ตั้งนัด</strong> บนการ์ดร้านค้า</span></div>'; }
  else {
    const overdue=[],todayA=[],future=[];
    [...apptShops].sort((a,b)=>a.appt.date.localeCompare(b.appt.date)).forEach(s=>{
      if(s.appt.date<t) overdue.push(s); else if(s.appt.date===t) todayA.push(s); else future.push(s);
    });
    let h='';
    if(overdue.length) h+=`<div class="remind-group"><div class="remind-group-label lbl-overdue"><i class="ti ti-alert-triangle" style="font-size:14px"></i>เลยกำหนด (${overdue.length})</div>${overdue.map(shopCard).join('')}</div>`;
    if(todayA.length) h+=`<div class="remind-group"><div class="remind-group-label lbl-today"><i class="ti ti-calendar-event" style="font-size:14px"></i>วันนี้ (${todayA.length})</div>${todayA.map(shopCard).join('')}</div>`;
    if(future.length){
      const byD={};
      future.forEach(s=>{ if(!byD[s.appt.date]) byD[s.appt.date]=[]; byD[s.appt.date].push(s); });
      Object.keys(byD).sort().forEach(d=>{ h+=`<div class="remind-group"><div class="remind-group-label lbl-future"><i class="ti ti-calendar" style="font-size:14px"></i>${fmtDateLong(d)}</div>${byD[d].map(shopCard).join('')}</div>`; });
    }
    vr.innerHTML=h;
  }

  // all
  const va=document.getElementById('view-all');
  if(!data.length){ va.innerHTML='<div class="empty"><i class="ti ti-database"></i>ยังไม่มีข้อมูล</div>'; }
  else {
    const byDate={};
    data.forEach(s=>{ if(!byDate[s.date]) byDate[s.date]=[]; byDate[s.date].push(s); });
    let h='';
    Object.keys(byDate).sort().reverse().forEach(d=>{
      const cnt=byDate[d].length,fl=byDate[d].filter(s=>s.status!=='reject').length;
      h+=`<div class="day-group"><div class="day-group-header"><span>${fmtDate(d)}</span><span class="counter-label">${cnt} ร้าน${fl>0?` · ติดตาม ${fl}`:' · ไม่มีติดตาม'}</span></div>${byDate[d].map(shopCard).join('')}</div>`;
    });
    va.innerHTML=h;
  }
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  ['today','followup','remind','all'].forEach(v=>{ document.getElementById('view-'+v).style.display=v===t?'block':'none'; });
}
function addShop(){
  const name=document.getElementById('fName').value.trim(), phone=document.getElementById('fPhone').value.trim();
  if(!name||!phone){ alert('กรุณากรอกชื่อร้านและเบอร์โทร'); return; }
  const today=getReportDate();
  if(data.filter(s=>s.date===today).length>=5&&!confirm('ครบ 5 ร้านแล้ว ต้องการเพิ่มเติมหรือไม่?')) return;
  data.unshift({ id:Date.now().toString(36)+Math.random().toString(36).slice(2,5), date:today, name, phone,
    addr:document.getElementById('fAddr').value.trim(), type:document.getElementById('fType').value,
    status:document.getElementById('fStatus').value, note:document.getElementById('fNote').value.trim(),
    photos:[], appt:null, created:new Date().toISOString() });
  save();
  ['fName','fPhone','fAddr','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fType').value=''; document.getElementById('fStatus').value='pending';
  render(); switchTab('today');
}
function chgStatus(id,status){ const s=data.find(d=>d.id===id); if(s){s.status=status;save();render();} }
function delShop(id){ if(!confirm('ลบร้านค้านี้?')) return; data=data.filter(d=>d.id!==id);save();render(); }
function toggleApptForm(id){ const el=document.getElementById('appt-form-'+id); if(el) el.style.display=el.style.display==='none'?'block':'none'; }
function saveAppt(id){
  const s=data.find(d=>d.id===id); if(!s) return;
  const date=document.getElementById('adate-'+id).value;
  if(!date){ alert('กรุณาเลือกวันที่นัดหมาย'); return; }
  s.appt={type:document.getElementById('atype-'+id).value,date};
  save(); render(); switchTab('remind');
}
function removeAppt(id){ const s=data.find(d=>d.id===id); if(!s||!confirm('ยกเลิกนัดหมายนี้?')) return; s.appt=null;save();render(); }
function clearData(){
  if(!confirm('ล้างข้อมูลทั้งหมด?\n\nแนะนำให้ Export ก่อนล้าง')) return;
  if(!confirm('ยืนยันอีกครั้ง — ข้อมูลจะหายถาวร')) return;
  data=[]; save(); render();
}
function exportPDF(){
  const statusTH={pending:'กำลังพิจารณา',quote:'ขอใบเสนอราคา',reject:'ปฏิเสธ'};
  const statusColor={pending:'#854F0B',quote:'#185FA5',reject:'#A32D2D'};
  const statusBg={pending:'#FAEEDA',quote:'#E6F1FB',reject:'#FCEBEB'};

  // group by date desc
  const byDate={};
  data.forEach(s=>{ if(!byDate[s.date]) byDate[s.date]=[]; byDate[s.date].push(s); });
  const dates=Object.keys(byDate).sort().reverse();

  if(!dates.length){ alert('ไม่มีข้อมูลสำหรับ Export'); return; }

  let body='';
  dates.forEach(d=>{
    const shops=byDate[d];
    const followCount=shops.filter(s=>s.status!=='reject').length;
    body+=`<div class="date-group">
      <div class="date-header">
        <span class="date-title">${fmtDateLong(d)}</span>
        <span class="date-meta">${shops.length} ร้าน${followCount>0?' · ต้องติดตาม '+followCount+' ร้าน':''}</span>
      </div>`;
    shops.forEach((s,i)=>{
      const photos=s.photos||[];
      const appt=s.appt;
      let apptStr='';
      if(appt&&appt.date){
        apptStr=`<div class="appt-row"><span class="appt-icon">${appt.type==='visit'?'📍':'📞'}</span> <strong>${apptTypeTH(appt.type)}</strong> — ${fmtDateLong(appt.date)}</div>`;
      }
      let photosHtml='';
      if(photos.length){
        photosHtml='<div class="photo-row">';
        photos.forEach(src=>{ photosHtml+=`<img src="${src}" class="photo-img">`; });
        photosHtml+='</div>';
      }
      body+=`<div class="shop-card">
        <div class="shop-top">
          <div class="shop-num">${i+1}</div>
          <div class="shop-detail">
            <div class="shop-name">${esc(s.name)}</div>
            <div class="shop-info">📞 ${esc(s.phone)}${s.addr?' &nbsp;|&nbsp; 📍 '+esc(s.addr):''}${s.type?' &nbsp;|&nbsp; 🏷 '+esc(s.type):''}</div>
            ${s.note?`<div class="shop-note">📝 ${esc(s.note)}</div>`:''}
            ${apptStr}
          </div>
          <div class="status-badge" style="background:${statusBg[s.status]};color:${statusColor[s.status]}">${statusTH[s.status]||s.status}</div>
        </div>
        ${photosHtml}
      </div>`;
    });
    body+='</div>';
  });

  const now=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  const html=`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
  <title>รายงานหาร้านค้าเช่า — ภูเก็ตโกรเซอรี่</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;font-size:13px;color:#1a1a18;background:#fff;padding:20mm 18mm}
    .report-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1a1a18;padding-bottom:10px;margin-bottom:18px}
    .report-title{font-size:18px;font-weight:700}
    .report-sub{font-size:12px;color:#6b6b68;margin-top:3px}
    .report-meta{text-align:right;font-size:11px;color:#6b6b68}
    .report-meta strong{display:block;font-size:13px;color:#1a1a18;margin-bottom:2px}
    .date-group{margin-bottom:20px;break-inside:avoid}
    .date-header{display:flex;justify-content:space-between;align-items:center;background:#f0f0ee;padding:7px 12px;border-radius:6px;margin-bottom:10px}
    .date-title{font-weight:700;font-size:13px}
    .date-meta{font-size:11px;color:#6b6b68}
    .shop-card{border:1px solid #e0e0dc;border-radius:6px;padding:10px 12px;margin-bottom:8px;break-inside:avoid}
    .shop-top{display:flex;align-items:flex-start;gap:10px}
    .shop-num{width:22px;height:22px;background:#1a1a18;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
    .shop-detail{flex:1;min-width:0}
    .shop-name{font-weight:700;font-size:14px;margin-bottom:3px}
    .shop-info{font-size:11px;color:#6b6b68;margin-bottom:4px;line-height:1.6}
    .shop-note{font-size:11px;color:#6b6b68;margin-top:4px;padding-top:4px;border-top:1px solid #e0e0dc;line-height:1.6}
    .appt-row{font-size:11px;color:#3C3489;margin-top:5px;padding:4px 8px;background:#EEEDFE;border-radius:4px;display:inline-block}
    .status-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;align-self:flex-start}
    .photo-row{display:flex;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #e0e0dc}
    .photo-img{width:110px;height:82px;object-fit:cover;border-radius:5px;border:1px solid #e0e0dc}
    .footer{margin-top:24px;padding-top:10px;border-top:1px solid #e0e0dc;font-size:10px;color:#9b9b98;display:flex;justify-content:space-between}
    @media print{
      body{padding:12mm 14mm}
      @page{size:A4;margin:0}
    }
  </style></head><body>
  <div class="report-header">
    <div>
      <div class="report-title">รายงานการหาร้านค้าเช่า</div>
      <div class="report-sub">ภูเก็ตโกรเซอรี่ — รายงานสรุปทั้งหมด</div>
    </div>
    <div class="report-meta">
      <strong>พิมพ์เมื่อ ${now}</strong>
      ข้อมูลทั้งหมด ${data.length} ร้าน / ${dates.length} วัน
    </div>
  </div>
  ${body}
  <div class="footer">
    <span>ภูเก็ตโกรเซอรี่ — รายงานการหาร้านค้าเช่า</span>
    <span>พิมพ์เมื่อ ${now}</span>
  </div>
  <script>window.onload=()=>{ window.print(); }<\/script>
  </body></html>`;

  const w=window.open('','_blank','width=900,height=700');
  w.document.write(html);
  w.document.close();
}

document.getElementById('reportDate').addEventListener('change', render);
document.getElementById('fName').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('fPhone').focus(); });
document.getElementById('fPhone').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('fAddr').focus(); });
document.getElementById('reportDate').value = todayStr();
load();
